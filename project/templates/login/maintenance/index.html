<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Login - Civic Resolve</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/auth-pages.css') }}">
</head>
<body class="login-page">
    <canvas id="bg-canvas"></canvas>
    <main class="login-shell">
        <section class="left">
            <div class="left-wrap">
                <img src="{{ url_for('static', filename='assets/images/sau-white-logo.png') }}" alt="SAU Logo">
                <h2 class="name">Civic Resolve</h2>
                <p class="sub">Maintenance Portal</p>
            </div>
        </section>
        <section class="right">
            <h1>Maintenance Login</h1>
            <p>Maintenance Staff & Admin</p>
            <form method="POST" class="login-form">
                <div class="form-group">
                    <input type="text" name="username" placeholder="Staff ID" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="role-btn">Login</button>
                <a href="{{ url_for('auth.home') }}" class="back-link">← Back to Role Selection</a>
            </form>
        </section>
    </main>
    <script src="{{ url_for('static', filename='assets/js/cache-guard.js') }}"></script>
    <script src="{{ url_for('static', filename='assets/js/auth-waves.js') }}"></script>
    <style>
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }
        .form-group {
            display: flex;
        }
        .form-group input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--divider);
            border-radius: 4px;
            font-size: 0.95rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--btn);
        }
        .back-link {
            text-align: center;
            color: var(--text-soft);
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 1rem;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--btn);
        }
    </style>
</body>
</html>
